<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vista Admin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="topbar">
      <h1>Dashboard Admin</h1>
      <div class="row">
        <a href="index.html"><button type="button">Home</button></a>
        <button id="logoutBtn" type="button">Logout</button>
      </div>
    </div>

    <p id="adminMessage" class="message"></p>

    <div class="card">
      <h2>Riepilogo</h2>
      <div id="summaryBox"></div>
    </div>

    <div class="card">
      <h2>Aggiungi Prodotto</h2>
      <div class="row">
        <input type="text" id="productName" placeholder="Nome prodotto" />
        <input type="number" id="productPrice" placeholder="Prezzo" min="0" step="0.01" />
        <input type="number" id="productStock" placeholder="Stock" min="0" step="1" />
        <button id="addProductBtn" type="button">Aggiungi</button>
      </div>
    </div>

    <div class="card">
      <h2>Assegna Crediti Bonus</h2>
      <div class="row">
        <select id="bonusUserSelect"></select>
        <input type="number" id="bonusAmount" placeholder="Crediti bonus" min="1" step="1" />
        <button id="addCreditsBtn" type="button">Assegna</button>
      </div>
    </div>

    <div class="card">
      <h2>Gestione Stock</h2>
      <div id="adminProductsList"></div>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
